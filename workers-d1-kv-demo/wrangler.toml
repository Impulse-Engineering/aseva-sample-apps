name = "workers-d1-kv-demo"
main = "src/index.js"
compatibility_date = "2025-03-20"
compatibility_flags = ["nodejs_compat"]

# account_id is injected by the Aseva deploy engine at deploy time via
# CLOUDFLARE_ACCOUNT_ID. You can also hardcode it here for local `wrangler dev`.
# account_id = "your-cloudflare-account-id"

# D1 database -- the Aseva platform provisions this for Workers-tier apps.
# After `platform_provision`, fetch the database_id from `platform_get_app`
# (resource type `cf_d1_database`) and paste it below before deploying.
[[d1_databases]]
binding = "DB"
database_name = "aseva-workers-d1-kv-demo"
database_id = "306676e3-f157-4ea7-bbd5-f880cf561270"
migrations_dir = "migrations"

# KV namespace -- also provisioned by the platform. Pull the namespace id from
# `platform_get_app` (resource type `cf_kv_namespace`) and paste it below.
[[kv_namespaces]]
binding = "CACHE"
id = "062fe16a89f74b56819c0fc392516754"

[vars]
APP_VERSION = "0.0.1"
